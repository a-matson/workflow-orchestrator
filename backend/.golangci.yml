version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - exhaustive
    - bodyclose
    - contextcheck
    - noctx
    - sqlclosecheck
    - rowserrcheck

linters-settings:
  goimports:
    local-prefixes: github.com/workflow-platform

  revive:
    rules:
      - name: exported
      - name: error-return
      - name: error-strings
      - name: unused-parameter

  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    # Tests are allowed to use unexported fields
    - path: _test\.go
      linters: [revive]

    # Integration tests have build tags
    - path: _integration_test\.go
      linters: [unused]

  max-same-issues: 0
  max-issues-per-linter: 0
