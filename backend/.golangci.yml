version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - exhaustive
    - bodyclose
    - contextcheck
    - noctx
    - sqlclosecheck
    - rowserrcheck

  settings:
    revive:
      rules:
        # - name: exported
        - name: error-return
        - name: error-strings
        # - name: unused-parameter

    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    rules:
      # Tests are allowed to use unexported fields
      - path: _test\.go
        linters: [revive]

      # Integration tests have build tags
      - path: _integration_test\.go
        linters: [unused]

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/a-matson/go-vue-DAG-orchestrator

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
