networks:
  fluxor:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [fluxor]
    environment:
      POSTGRES_DB: workflow
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow -d workflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [fluxor]
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [fluxor]
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      POSTGRES_URL: postgres://workflow:workflow@postgres:5432/workflow?sslmode=disable
      REDIS_ADDR: redis:6379
      HTTP_ADDR: :8080
      GRPC_ADDR: :9090
      LOG_LEVEL: info
      WORKER_COUNT: "3"
      WORKER_CONCURRENCY: "5"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    image: nginx:1.25-alpine
    restart: unless-stopped
    networks: [fluxor]
    ports: ["3000:80"]
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend: {condition: service_healthy}

  redis-commander:
    image: rediscommander/redis-commander:latest
    networks: [fluxor]
    environment:
      REDIS_HOSTS: "fluxor:redis:6379"
    ports: ["8081:8081"]
    depends_on: [redis]
    profiles: [tools]
