<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflow Orchestration Platform</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a26;
    --surface: #1e1e2e;
    --surface2: #252535;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #606078;
    --accent: #7c6aff;
    --accent2: #5b4bd4;
    --green: #22d3a0;
    --amber: #f5a623;
    --red: #ff5f57;
    --blue: #3b9eff;
    --purple: #c084fc;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ─── App Shell ─── */
  .app-shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ─── Top Bar ─── */
  .topbar {
    display: flex; align-items: center;
    padding: 0 20px; height: 52px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    gap: 20px; flex-shrink: 0;
  }

  .topbar-brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
  }

  .brand-icon {
    width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, #7c6aff, #3b9eff);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  .topbar-nav { display: flex; gap: 2px; }

  .nav-tab {
    padding: 6px 14px; border-radius: 7px; font-size: 13px;
    font-weight: 500; cursor: pointer; border: none;
    background: transparent; color: var(--text2);
    transition: all 0.15s;
  }
  .nav-tab:hover { background: var(--bg3); color: var(--text); }
  .nav-tab.active { background: var(--surface); color: var(--text); }

  .topbar-spacer { flex: 1; }

  .ws-indicator {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text3); font-family: var(--mono);
  }
  .ws-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--red); transition: background 0.3s;
  }
  .ws-dot.connected { background: var(--green); animation: pulse-ws 2s infinite; }

  @keyframes pulse-ws { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .topbar-metric {
    display: flex; flex-direction: column; align-items: center;
    padding: 0 14px; border-left: 1px solid var(--border);
  }
  .metric-val { font-size: 15px; font-weight: 600; font-family: var(--mono); line-height: 1.1; }
  .metric-key { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); }

  /* ─── Main Layout ─── */
  .main-layout { display: flex; flex: 1; overflow: hidden; }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 260px; flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section { padding: 14px 16px 8px; }
  .section-title {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text3); font-weight: 600; margin-bottom: 8px;
  }

  .sidebar-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .workflow-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; cursor: pointer;
    transition: background 0.1s;
    border-radius: 0;
  }
  .workflow-item:hover { background: var(--bg3); }
  .workflow-item.active { background: rgba(124,106,255,0.1); }

  .workflow-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0;
    background: var(--surface);
  }

  .workflow-meta { flex: 1; min-width: 0; }
  .workflow-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .workflow-sub { font-size: 10px; color: var(--text3); }

  .run-btn {
    width: 22px; height: 22px; border-radius: 5px;
    background: var(--accent); border: none; color: #fff;
    font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .workflow-item:hover .run-btn { opacity: 1; }

  .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }

  .new-workflow-btn {
    width: 100%; padding: 8px;
    background: rgba(124,106,255,0.12);
    border: 1px dashed rgba(124,106,255,0.3);
    border-radius: 8px; color: var(--accent);
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all 0.15s;
  }
  .new-workflow-btn:hover { background: rgba(124,106,255,0.2); }

  /* ─── Content Area ─── */
  .content-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* ─── Tab Panels ─── */
  .tab-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .tab-panel.active { display: flex; }

  /* ─── Builder Panel ─── */
  .builder-panel {
    display: grid; grid-template-columns: 1fr 320px;
    flex: 1; overflow: hidden; gap: 0;
  }

  .dag-canvas {
    background: var(--bg3);
    border-right: 1px solid var(--border);
    overflow: hidden; position: relative;
  }

  .canvas-toolbar {
    position: absolute; top: 12px; left: 12px; right: 12px;
    z-index: 10; display: flex; gap: 8px; flex-wrap: wrap;
  }

  .canvas-toolbar input {
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--text); border-radius: 8px; padding: 7px 12px;
    font-size: 13px; font-family: var(--sans); outline: none;
    font-weight: 500; flex: 1; min-width: 160px;
  }
  .canvas-toolbar input:focus { border-color: var(--accent); }

  .toolbar-btn {
    padding: 7px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    white-space: nowrap;
  }
  .toolbar-btn:hover { background: var(--surface2); }
  .toolbar-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .toolbar-btn.primary:hover { background: var(--accent2); }
  .toolbar-btn.run { background: rgba(34,211,160,0.15); color: var(--green); border-color: rgba(34,211,160,0.3); }
  .toolbar-btn.run:hover { background: rgba(34,211,160,0.25); }

  /* ─── DAG SVG Canvas ─── */
  .dag-svg-container {
    position: absolute; top: 60px; bottom: 0; left: 0; right: 0;
    overflow: auto;
  }

  .dag-svg { cursor: grab; }
  .dag-svg:active { cursor: grabbing; }

  .dag-node {
    cursor: pointer;
    transition: all 0.15s;
  }
  .dag-node:hover .node-rect { filter: brightness(1.15); }
  .dag-node.selected .node-rect { stroke: var(--accent) !important; stroke-width: 2px !important; }

  .node-rect {
    rx: 10; ry: 10;
    stroke-width: 1.5px;
    transition: all 0.2s;
  }

  .node-pulse {
    rx: 10; ry: 10; fill: none;
    animation: nodePulse 1.4s ease-in-out infinite;
  }
  @keyframes nodePulse { 0%,100%{stroke-opacity:0.4} 50%{stroke-opacity:0.9} }

  .dag-edge {
    fill: none; stroke-width: 2;
    marker-end: url(#arrowhead);
  }

  /* ─── Config Panel ─── */
  .config-sidebar {
    background: var(--bg2); overflow-y: auto;
    border-left: 1px solid var(--border);
  }

  .config-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .config-section h3 { font-size: 12px; font-weight: 600; margin-bottom: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }

  .field-group { display: flex; flex-direction: column; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--text3); font-weight: 500; }
  .field input, .field select, .field textarea {
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--text); border-radius: 7px; padding: 7px 10px;
    font-size: 12px; font-family: var(--sans); outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }

  .add-task-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
    padding: 12px 16px;
  }

  .task-type-btn {
    padding: 10px 8px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--text2); font-size: 11px; font-weight: 500;
    text-align: center; transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .task-type-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .task-type-btn .type-icon { font-size: 18px; }

  /* ─── Execution Panel ─── */
  .execution-panel {
    flex: 1; display: grid;
    grid-template-columns: 360px 1fr;
    overflow: hidden;
  }

  .exec-list {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .exec-list-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }

  .exec-list-header h2 { font-size: 13px; font-weight: 600; }

  .exec-list-scroll { flex: 1; overflow-y: auto; }
  .exec-list-scroll::-webkit-scrollbar { width: 4px; }
  .exec-list-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .exec-item {
    padding: 12px 16px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .exec-item:hover { background: var(--bg3); }
  .exec-item.active { background: rgba(124,106,255,0.1); border-left: 2px solid var(--accent); }

  .exec-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .exec-wf-name { font-size: 12px; font-weight: 600; }
  .exec-time { font-size: 10px; color: var(--text3); font-family: var(--mono); }

  .exec-item-bottom { display: flex; align-items: center; gap: 8px; }

  .exec-progress {
    flex: 1; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden;
  }
  .exec-progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  .exec-task-count { font-size: 10px; color: var(--text3); font-family: var(--mono); white-space: nowrap; }

  /* ─── Execution Detail ─── */
  .exec-detail {
    display: flex; flex-direction: column; overflow: hidden;
  }

  .exec-detail-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px; flex-shrink: 0;
  }

  .exec-detail-title { font-size: 15px; font-weight: 600; }
  .exec-detail-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); }

  .exec-detail-actions { margin-left: auto; display: flex; gap: 8px; }
  .action-btn {
    padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text2);
  }
  .action-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
  .action-btn.retry { color: var(--amber); border-color: rgba(245,166,35,0.3); }
  .action-btn.retry:hover { background: rgba(245,166,35,0.1); }

  .exec-detail-body {
    flex: 1; display: grid; grid-template-rows: auto 1fr;
    overflow: hidden;
  }

  /* ─── DAG Visualization ─── */
  .dag-viz { height: 300px; position: relative; border-bottom: 1px solid var(--border); background: var(--bg3); overflow: hidden; }

  .dag-viz svg { width: 100%; height: 100%; }

  /* ─── Stats Bar ─── */
  .stats-bar {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }

  .stat-box {
    flex: 1; padding: 10px 14px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 2px;
  }
  .stat-box:last-child { border-right: none; }
  .stat-box-val { font-size: 18px; font-weight: 600; font-family: var(--mono); line-height: 1; }
  .stat-box-key { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }

  /* ─── Log Panel ─── */
  .log-panel {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }

  .log-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg2); flex-shrink: 0; flex-wrap: wrap;
  }

  .log-search {
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--text); border-radius: 6px; padding: 5px 10px;
    font-size: 12px; font-family: var(--mono); outline: none; width: 180px;
  }
  .log-search:focus { border-color: var(--accent); }

  .log-filter-btn {
    padding: 4px 10px; border-radius: 5px; font-size: 11px;
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--text3); cursor: pointer;
  }
  .log-filter-btn.active { color: var(--accent); border-color: rgba(124,106,255,0.4); background: rgba(124,106,255,0.1); }

  .log-count-badge { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-left: auto; }

  .log-container {
    flex: 1; overflow-y: auto;
    padding: 6px 0; background: #0a0a12;
  }
  .log-container::-webkit-scrollbar { width: 4px; }
  .log-container::-webkit-scrollbar-thumb { background: var(--border2); }

  .log-entry {
    display: flex; align-items: baseline; gap: 8px;
    padding: 1px 16px; font-family: var(--mono); font-size: 11px;
    line-height: 1.8; transition: background 0.1s;
  }
  .log-entry:hover { background: rgba(255,255,255,0.03); }
  .log-entry.new-entry { animation: flashLog 0.5s ease; }

  @keyframes flashLog { from{ background: rgba(59,158,255,0.12) } to { background: transparent } }

  .log-ts { color: #4a5568; flex-shrink: 0; font-size: 10px; }
  .log-lvl { flex-shrink: 0; width: 38px; text-align: center; border-radius: 3px; font-size: 9px; font-weight: 600; padding: 0 3px; }
  .log-lvl.INFO { background: rgba(59,158,255,0.12); color: #63b3ed; }
  .log-lvl.WARN { background: rgba(245,166,35,0.12); color: #ecc94b; }
  .log-lvl.ERROR { background: rgba(255,95,87,0.12); color: #fc8181; }
  .log-task-tag { color: #9f7aea; font-size: 10px; background: rgba(159,122,234,0.1); padding: 0 5px; border-radius: 3px; flex-shrink: 0; }
  .log-msg { color: #cbd5e0; flex: 1; }
  .log-entry.ERROR .log-msg { color: #fc8181; }
  .log-entry.WARN .log-msg { color: #ecc94b; }

  /* ─── Metrics Panel ─── */
  .metrics-panel { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

  .metric-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
  }
  .metric-card-val { font-size: 28px; font-weight: 600; font-family: var(--mono); line-height: 1; margin-bottom: 4px; }
  .metric-card-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
  .metric-card-delta { font-size: 11px; margin-top: 6px; }
  .delta-up { color: var(--green); }
  .delta-down { color: var(--red); }

  .chart-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
  }
  .chart-title { font-size: 12px; font-weight: 600; margin-bottom: 14px; color: var(--text2); }

  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.4s; }
  .bar-label { font-size: 9px; color: var(--text3); }

  /* ─── Status badges ─── */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 20px;
    font-size: 10px; font-weight: 600; white-space: nowrap;
  }
  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .badge.pending { background: rgba(144,144,168,0.12); color: #9090a8; }
  .badge.queued { background: rgba(192,132,252,0.12); color: var(--purple); }
  .badge.running { background: rgba(59,158,255,0.12); color: var(--blue); animation: badgePulse 1.5s infinite; }
  .badge.completed { background: rgba(34,211,160,0.12); color: var(--green); }
  .badge.failed { background: rgba(255,95,87,0.12); color: var(--red); }
  .badge.retrying { background: rgba(245,166,35,0.12); color: var(--amber); }
  .badge.dead_letter { background: rgba(255,95,87,0.08); color: #c53030; }

  @keyframes badgePulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

  /* ─── Misc ─── */
  .divider { height: 1px; background: var(--border); margin: 0; }

  .empty-hint {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%;
    color: var(--text3); gap: 10px; font-size: 13px;
  }
  .empty-hint .hint-icon { font-size: 40px; opacity: 0.3; }

  .scrollable { overflow-y: auto; }
  .scrollable::-webkit-scrollbar { width: 4px; }
  .scrollable::-webkit-scrollbar-thumb { background: var(--border2); }
</style>
</head>
<body>
<div class="app-shell" id="app">

  <!-- ─── Topbar ─── -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="brand-icon">⬡</div>
      Fluxor
    </div>

    <div class="topbar-nav">
      <button class="nav-tab active" onclick="switchTab('builder')">Builder</button>
      <button class="nav-tab" onclick="switchTab('executions')">Executions</button>
      <button class="nav-tab" onclick="switchTab('logs')">Logs</button>
      <button class="nav-tab" onclick="switchTab('metrics')">Metrics</button>
    </div>

    <div class="topbar-spacer"></div>

    <div class="ws-indicator">
      <div class="ws-dot" id="ws-dot"></div>
      <span id="ws-label">Connecting…</span>
    </div>

    <div class="topbar-metric">
      <div class="metric-val" id="hdr-active" style="color:var(--blue)">0</div>
      <div class="metric-key">Active</div>
    </div>
    <div class="topbar-metric">
      <div class="metric-val" id="hdr-completed" style="color:var(--green)">0</div>
      <div class="metric-key">Done</div>
    </div>
    <div class="topbar-metric">
      <div class="metric-val" id="hdr-failed" style="color:var(--red)">0</div>
      <div class="metric-key">Failed</div>
    </div>
    <div class="topbar-metric">
      <div class="metric-val" id="hdr-queue" style="color:var(--amber)">0</div>
      <div class="metric-key">Queue</div>
    </div>
  </div>

  <!-- ─── Main Layout ─── -->
  <div class="main-layout">

    <!-- ─── Sidebar ─── -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="section-title">Workflows</div>
      </div>
      <div class="sidebar-scroll" id="workflow-list"></div>
      <div class="sidebar-footer">
        <button class="new-workflow-btn" onclick="loadTemplate('etl')">+ New Workflow</button>
      </div>
    </div>

    <!-- ─── Content Area ─── -->
    <div class="content-area">

      <!-- ─── Builder Tab ─── -->
      <div class="tab-panel active" id="tab-builder">
        <div class="builder-panel">

          <!-- Canvas -->
          <div class="dag-canvas">
            <div class="canvas-toolbar">
              <input type="text" id="wf-name-input" value="ETL Pipeline" placeholder="Workflow name…" />
              <button class="toolbar-btn" onclick="autoLayout()">Auto Layout</button>
              <button class="toolbar-btn" onclick="validateDAG()">Validate</button>
              <button class="toolbar-btn primary" onclick="saveCurrentWorkflow()">Save</button>
              <button class="toolbar-btn run" onclick="triggerCurrentWorkflow()">▶ Run</button>
            </div>
            <div class="dag-svg-container" id="dag-container">
              <svg id="dag-svg" class="dag-svg" width="900" height="600">
                <defs>
                  <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                    <polygon points="0 0, 8 3, 0 6" fill="#4a4a68" />
                  </marker>
                  <marker id="arrowhead-running" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                    <polygon points="0 0, 8 3, 0 6" fill="#3b9eff" />
                  </marker>
                </defs>
                <g id="edges-layer"></g>
                <g id="nodes-layer"></g>
              </svg>
            </div>
          </div>

          <!-- Config Sidebar -->
          <div class="config-sidebar">
            <div class="config-section">
              <h3>Add Task</h3>
              <div class="add-task-grid" id="task-type-grid"></div>
            </div>
            <div class="config-section" id="node-config-section" style="display:none">
              <h3>Task Config</h3>

<script>
// ═══════════════════════════════════════════════════════
// SIMULATION ENGINE
// Full in-browser simulation of the distributed platform
// ═══════════════════════════════════════════════════════

const TASK_TYPES = [
  { value: 'http_request', label: 'HTTP', icon: '🌐' },
  { value: 'data_transform', label: 'Transform', icon: '⚡' },
  { value: 'database_query', label: 'Database', icon: '🗄️' },
  { value: 'ml_inference', label: 'ML Model', icon: '🧠' },
  { value: 'notification', label: 'Notify', icon: '📨' },
  { value: 'generic', label: 'Generic', icon: '⚙️' },
];

const STATUS_COLORS = {
  pending: '#9090a8', queued: '#c084fc', running: '#3b9eff',
  completed: '#22d3a0', failed: '#ff5f57', retrying: '#f5a623',
  dead_letter: '#c53030', cancelled: '#ff5f57',
};

const STATUS_BG = {
  pending: 'rgba(144,144,168,0.1)', queued: 'rgba(192,132,252,0.1)',
  running: 'rgba(59,158,255,0.1)', completed: 'rgba(34,211,160,0.1)',
  failed: 'rgba(255,95,87,0.1)', retrying: 'rgba(245,166,35,0.1)',
  dead_letter: 'rgba(197,48,48,0.1)',
};

// ─── State ───────────────────────────────────────────
let workflows = [];
let executions = [];
let allLogs = [];
let currentWorkflow = null;
let selectedExecId = null;
let logLevelFilter = 'all';
let logSearchFilter = '';
let simMetrics = {
  workflows_started: 0, workflows_completed: 0, workflows_failed: 0,
  tasks_dispatched: 0, tasks_completed: 0, tasks_failed: 0,
  tasks_retried: 0, queue_depth: 0, ws_clients: 3,
};
let throughputHistory = Array(12).fill(0);
let selectedNodeId = null;
let dagNodes = []; // { id, name, type, dependencies, x, y }
let dragState = null;

// ─── Workflow Templates ────────────────────────────────
const TEMPLATES = {
  etl: {
    name: 'ETL Pipeline',
    tasks: [
      { id: 'ingest', name: 'Ingest Raw Data', type: 'database_query', dependencies: [], x: 340, y: 40 },
      { id: 'validate', name: 'Validate Schema', type: 'data_transform', dependencies: ['ingest'], x: 340, y: 160 },
      { id: 'clean', name: 'Clean & Dedupe', type: 'data_transform', dependencies: ['validate'], x: 200, y: 280 },
      { id: 'enrich', name: 'Enrich Records', type: 'http_request', dependencies: ['validate'], x: 480, y: 280 },
      { id: 'transform', name: 'Apply Transforms', type: 'data_transform', dependencies: ['clean', 'enrich'], x: 340, y: 400 },
      { id: 'load', name: 'Load to Warehouse', type: 'database_query', dependencies: ['transform'], x: 200, y: 520 },
      { id: 'notify', name: 'Send Report', type: 'notification', dependencies: ['transform'], x: 480, y: 520 },
    ]
  },
  ml: {
    name: 'ML Training Pipeline',
    tasks: [
      { id: 'fetch', name: 'Fetch Dataset', type: 'http_request', dependencies: [], x: 150, y: 40 },
      { id: 'preproc', name: 'Preprocessing', type: 'data_transform', dependencies: ['fetch'], x: 150, y: 160 },
      { id: 'split', name: 'Train/Val Split', type: 'generic', dependencies: ['preproc'], x: 150, y: 280 },
      { id: 'train', name: 'Model Training', type: 'ml_inference', dependencies: ['split'], x: 150, y: 400 },
      { id: 'eval', name: 'Evaluate Model', type: 'ml_inference', dependencies: ['train'], x: 150, y: 520 },
      { id: 'deploy', name: 'Deploy Model', type: 'http_request', dependencies: ['eval'], x: 150, y: 640 },

    ]

};

// ─── Initialization ────────────────────────────────────
function init() {
  renderTaskTypeGrid();
  loadTemplate('etl');
  simulateConnection();
  setInterval(simulationTick, 800);
  setInterval(updateMetricsDisplay, 1000);
  setInterval(updateExecListDisplay, 500);
}

function simulateConnection() {
  setTimeout(() => {
    const dot = document.getElementById('ws-dot');
    const label = document.getElementById('ws-label');
    dot.classList.add('connected');
    label.textContent = 'Connected · 3 clients';
    addLogEntry('system', 'INFO', 'WebSocket hub connected', { clients: 3 });
    addLogEntry('system', 'INFO', 'Result processor started', {});
    addLogEntry('system', 'INFO', 'Retry poller started', {});
    addLogEntry('system', 'INFO', 'Worker pool started (3 workers × 5 concurrency)', {});
  }, 600);
}

// ─── DAG Builder ────────────────────────────────────────
function loadTemplate(name) {
  const tpl = TEMPLATES[name];
  if (!tpl) return;
  dagNodes = tpl.tasks.map(t => ({ ...t, dependencies: [...t.dependencies] }));
  document.getElementById('wf-name-input').value = tpl.name;
  selectedNodeId = null;
  renderDAG();
  hideNodeConfig();

  // Create workflow in state
  const wfId = 'wf-' + name + '-' + Date.now();
  const wf = { id: wfId, name: tpl.name, tasks: tpl.tasks, created: new Date() };
  workflows.unshift(wf);
  currentWorkflow = wf;
  renderWorkflowList();
}

function renderTaskTypeGrid() {
  const grid = document.getElementById('task-type-grid');
  grid.innerHTML = TASK_TYPES.map(t => `
    <button class="task-type-btn" onclick="addTask('${t.value}', '${t.label}', '${t.icon}')">
      <span class="type-icon">${t.icon}</span>
      ${t.label}
    </button>
  `).join('');
}

function addTask(type, label, icon) {
  const id = type + '-' + Math.random().toString(36).slice(2, 6);
  dagNodes.push({
    id, name: `${label} Task`, type,
    dependencies: selectedNodeId ? [selectedNodeId] : [],
    x: 100 + Math.random() * 500, y: 100 + dagNodes.length * 100,
  });
  renderDAG();
  addLogEntry('builder', 'INFO', `Added task: ${label}`, { task_id: id });
}

function renderDAG(execTasks) {
  const svg = document.getElementById('dag-svg');
  const edgesLayer = document.getElementById('edges-layer');
  const nodesLayer = document.getElementById('nodes-layer');
  edgesLayer.innerHTML = '';
  nodesLayer.innerHTML = '';

  const taskStatusMap = {};
  if (execTasks) execTasks.forEach(t => { taskStatusMap[t.task_definition_id] = t; });

  // Compute SVG bounds
  const maxX = Math.max(...dagNodes.map(n => n.x + 180), 800);
  const maxY = Math.max(...dagNodes.map(n => n.y + 80), 500);
  svg.setAttribute('width', maxX + 40);
  svg.setAttribute('height', maxY + 40);

  // Draw edges
  dagNodes.forEach(node => {
    node.dependencies.forEach(depId => {
      const dep = dagNodes.find(n => n.id === depId);
      if (!dep) return;
      const x1 = dep.x + 90, y1 = dep.y + 50;
      const x2 = node.x + 90, y2 = node.y;
      const taskExec = taskStatusMap[node.id];
      const isRunning = taskExec?.status === 'running';
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const cy = (y1 + y2) / 2;
      path.setAttribute('d', `M${x1},${y1} C${x1},${cy} ${x2},${cy} ${x2},${y2}`);
      path.setAttribute('class', 'dag-edge');
      path.setAttribute('stroke', isRunning ? '#3b9eff' : '#2e2e48');
      path.setAttribute('stroke-dasharray', isRunning ? '6 3' : 'none');
      path.setAttribute('marker-end', isRunning ? 'url(#arrowhead-running)' : 'url(#arrowhead)');
      if (isRunning) {
        const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
        anim.setAttribute('attributeName', 'stroke-dashoffset');
        anim.setAttribute('from', '0'); anim.setAttribute('to', '-18');
        anim.setAttribute('dur', '0.6s'); anim.setAttribute('repeatCount', 'indefinite');
        path.appendChild(anim);
      }
      edgesLayer.appendChild(path);
    });
  });

  // Draw nodes
  dagNodes.forEach(node => {
    const taskExec = taskStatusMap[node.id];
    const status = taskExec?.status || 'pending';
    const color = STATUS_COLORS[status] || '#9090a8';
    const bg = STATUS_BG[status] || 'rgba(144,144,168,0.08)';
    const typeInfo = TASK_TYPES.find(t => t.value === node.type) || { icon: '⚙️', label: 'Task' };

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'dag-node' + (selectedNodeId === node.id ? ' selected' : ''));
    g.setAttribute('data-id', node.id);

    // Background rect
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('class', 'node-rect');
    rect.setAttribute('x', node.x); rect.setAttribute('y', node.y);
    rect.setAttribute('width', 180); rect.setAttribute('height', 50);
    rect.setAttribute('fill', '#1a1a2e');
    rect.setAttribute('stroke', color);
    rect.setAttribute('stroke-width', selectedNodeId === node.id ? '2' : '1');
    rect.setAttribute('rx', '10');

    // Running pulse ring
    if (status === 'running') {
      const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      pulse.setAttribute('class', 'node-pulse');
      pulse.setAttribute('x', node.x - 2); pulse.setAttribute('y', node.y - 2);
      pulse.setAttribute('width', 184); pulse.setAttribute('height', 54);
      pulse.setAttribute('stroke', color); pulse.setAttribute('stroke-width', '2');
      pulse.setAttribute('rx', '12');
      g.appendChild(pulse);
    }

    // Status bar at top
    const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bar.setAttribute('x', node.x + 1); bar.setAttribute('y', node.y + 1);
    bar.setAttribute('width', 178); bar.setAttribute('height', 3);
    bar.setAttribute('fill', color); bar.setAttribute('rx', '9');

    // Icon
    const icon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    icon.setAttribute('x', node.x + 14); icon.setAttribute('y', node.y + 30);
    icon.setAttribute('font-size', '14'); icon.setAttribute('dominant-baseline', 'middle');
    icon.textContent = typeInfo.icon;

    // Task name
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', node.x + 34); label.setAttribute('y', node.y + 22);
    label.setAttribute('fill', '#e8e8f0'); label.setAttribute('font-size', '11');
    label.setAttribute('font-family', 'DM Sans, sans-serif'); label.setAttribute('font-weight', '600');
    const maxChars = 18;
    label.textContent = node.name.length > maxChars ? node.name.slice(0, maxChars) + '…' : node.name;

    // Type label
    const typeLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    typeLabel.setAttribute('x', node.x + 34); typeLabel.setAttribute('y', node.y + 37);
    typeLabel.setAttribute('fill', color); typeLabel.setAttribute('font-size', '9');
    typeLabel.setAttribute('font-family', 'IBM Plex Mono, monospace');
    typeLabel.textContent = typeInfo.label.toUpperCase();

    // Retry badge
    if (taskExec?.retry_count > 0) {
      const retryBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      retryBg.setAttribute('x', node.x + 148); retryBg.setAttribute('y', node.y + 8);
      retryBg.setAttribute('width', 24); retryBg.setAttribute('height', 14);
      retryBg.setAttribute('fill', 'rgba(245,166,35,0.2)'); retryBg.setAttribute('rx', '4');
      const retryText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      retryText.setAttribute('x', node.x + 160); retryText.setAttribute('y', node.y + 17);
      retryText.setAttribute('fill', '#f5a623'); retryText.setAttribute('font-size', '9');
      retryText.setAttribute('font-family', 'IBM Plex Mono, monospace');
      retryText.setAttribute('text-anchor', 'middle');
      retryText.textContent = '↺' + taskExec.retry_count;
      g.appendChild(retryBg); g.appendChild(retryText);
    }

    g.appendChild(rect); g.appendChild(bar); g.appendChild(icon);
    g.appendChild(label); g.appendChild(typeLabel);

    // Drag & click
    g.addEventListener('click', (e) => { e.stopPropagation(); selectNode(node.id); });
    g.addEventListener('mousedown', (e) => startDrag(e, node.id));
    nodesLayer.appendChild(g);
  });
}

function selectNode(id) {
  selectedNodeId = selectedNodeId === id ? null : id;
  renderDAG();
  if (selectedNodeId) {
    showNodeConfig(dagNodes.find(n => n.id === id));
  } else {
    hideNodeConfig();
  }
}

function showNodeConfig(node) {
  const section = document.getElementById('node-config-section');
  const fields = document.getElementById('node-config-fields');
  section.style.display = 'block';
  fields.innerHTML = `
    <div class="field">
      <label>Task Name</label>
      <input type="text" value="${node.name}" onchange="updateNodeName('${node.id}', this.value)" />
    </div>
    <div class="field">
      <label>Type</label>
      <select onchange="updateNodeType('${node.id}', this.value)">
        ${TASK_TYPES.map(t => `<option value="${t.value}" ${t.value === node.type ? 'selected' : ''}>${t.label}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>Max Retries</label>
      <input type="number" min="0" max="10" value="3" />
    </div>
    <div class="field">
      <label>Timeout (s)</label>
      <input type="number" min="0" value="300" />
    </div>
    <button class="toolbar-btn" style="margin-top:4px;color:#ff5f57;border-color:rgba(255,95,87,0.3)" onclick="deleteNode('${node.id}')">Delete Task</button>
  `;
}

function hideNodeConfig() {
  document.getElementById('node-config-section').style.display = 'none';
}

function updateNodeName(id, val) {
  const n = dagNodes.find(n => n.id === id);
  if (n) { n.name = val; renderDAG(); }
}
function updateNodeType(id, val) {
  const n = dagNodes.find(n => n.id === id);
  if (n) { n.type = val; renderDAG(); showNodeConfig(n); }
}
function deleteNode(id) {
  dagNodes = dagNodes.filter(n => n.id !== id);
  dagNodes.forEach(n => { n.dependencies = n.dependencies.filter(d => d !== id); });
  selectedNodeId = null;
  hideNodeConfig();
  renderDAG();
}

// Drag nodes
function startDrag(e, id) {
  const node = dagNodes.find(n => n.id === id);
  if (!node) return;
  const svg = document.getElementById('dag-svg');
  const pt = svg.createSVGPoint();
  pt.x = e.clientX; pt.y = e.clientY;
  const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
  dragState = { id, startX: svgP.x - node.x, startY: svgP.y - node.y };

  const onMove = (me) => {
    if (!dragState) return;
    const mp = svg.createSVGPoint();
    mp.x = me.clientX; mp.y = me.clientY;
    const svgMp = mp.matrixTransform(svg.getScreenCTM().inverse());
    const n = dagNodes.find(n => n.id === dragState.id);
    if (n) { n.x = Math.max(10, svgMp.x - dragState.startX); n.y = Math.max(10, svgMp.y - dragState.startY); renderDAG(); }
  };
  const onUp = () => { dragState = null; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function autoLayout() {
  const deps = new Map(dagNodes.map(n => [n.id, new Set(n.dependencies)]));
  const levels = new Map();

  function getLevel(id) {
    if (levels.has(id)) return levels.get(id);
    const node = dagNodes.find(n => n.id === id);
    const depLevel = Math.max(0, ...[...deps.get(id)].map(d => getLevel(d) + 1));
    levels.set(id, depLevel);
    return depLevel;
  }
  dagNodes.forEach(n => getLevel(n.id));

  const byLevel = new Map();
  levels.forEach((lv, id) => { if (!byLevel.has(lv)) byLevel.set(lv, []); byLevel.get(lv).push(id); });

  const levelWidth = 220, rowHeight = 140;
  byLevel.forEach((ids, level) => {
    const totalW = ids.length * levelWidth;
    ids.forEach((id, i) => {
      const node = dagNodes.find(n => n.id === id);
      if (node) { node.x = -totalW / 2 + i * levelWidth + levelWidth / 2 - 90 + 450; node.y = level * rowHeight + 40; }
    });
  });
  renderDAG();
}

function validateDAG() {
  // Cycle detection via DFS
  const visited = new Set(), stack = new Set();
  let hasCycle = false;
  const adj = new Map(dagNodes.map(n => [n.id, n.dependencies]));

  function dfs(id) {
    if (stack.has(id)) { hasCycle = true; return; }
    if (visited.has(id)) return;
    visited.add(id); stack.add(id);
    for (const dep of adj.get(id) || []) dfs(dep);
    stack.delete(id);
  }
  dagNodes.forEach(n => dfs(n.id));

  const msg = hasCycle ? '⚠ Cycle detected in DAG' : `✓ DAG valid — ${dagNodes.length} tasks, no cycles`;
  addLogEntry('validator', hasCycle ? 'WARN' : 'INFO', msg, { tasks: dagNodes.length });
  showToast(msg, hasCycle ? 'warn' : 'success');
}

function showToast(msg, type) {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'toast';
  toast.style.cssText = `
    position:fixed;bottom:20px;right:20px;z-index:9999;
    padding:10px 18px;border-radius:8px;font-size:12px;font-weight:500;
    background:${type === 'success' ? 'rgba(34,211,160,0.15)' : 'rgba(245,166,35,0.15)'};
    border:1px solid ${type === 'success' ? 'rgba(34,211,160,0.3)' : 'rgba(245,166,35,0.3)'};
    color:${type === 'success' ? '#22d3a0' : '#f5a623'};
    animation: slideUp 0.2s ease;
  `;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

let currentWorkflowId = null;

function saveCurrentWorkflow() {
  const name = document.getElementById('wf-name-input').value || 'Untitled';
  const id = 'wf-' + Date.now();
  currentWorkflowId = id;
  const wf = { id, name, tasks: JSON.parse(JSON.stringify(dagNodes)), created: new Date() };
  workflows.unshift(wf);
  currentWorkflow = wf;
  renderWorkflowList();
  showToast(`✓ Workflow "${name}" saved`, 'success');
  addLogEntry('api', 'INFO', `Workflow saved: ${name}`, { id });
}

function triggerCurrentWorkflow() {
  if (!currentWorkflow) { saveCurrentWorkflow(); }
  startExecution(currentWorkflow);
  switchTab('executions');
}

// ─── Workflow List ────────────────────────────────────
function renderWorkflowList() {
  const list = document.getElementById('workflow-list');
  if (!workflows.length) {
    list.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:12px;text-align:center">No workflows yet</div>';
    return;
  }
  list.innerHTML = workflows.slice(0, 15).map(wf => `
    <div class="workflow-item ${currentWorkflow?.id === wf.id ? 'active' : ''}" onclick="selectWorkflow('${wf.id}')">
      <div class="workflow-icon">⬡</div>
      <div class="workflow-meta">
        <div class="workflow-name">${wf.name}</div>
        <div class="workflow-sub">${wf.tasks.length} tasks</div>
      </div>
      <button class="run-btn" onclick="event.stopPropagation();triggerWorkflowById('${wf.id}')">▶</button>
    </div>
  `).join('');
}

function selectWorkflow(id) {
  const wf = workflows.find(w => w.id === id);
  if (!wf) return;
  currentWorkflow = wf;
  dagNodes = JSON.parse(JSON.stringify(wf.tasks));
  document.getElementById('wf-name-input').value = wf.name;
  currentWorkflowId = id;
  renderDAG();
  renderWorkflowList();
  switchTab('builder');
}

function triggerWorkflowById(id) {
  const wf = workflows.find(w => w.id === id);
  if (wf) { startExecution(wf); switchTab('executions'); }
}

// ─── Execution Simulation ─────────────────────────────
function startExecution(wf) {
  const execId = 'exec-' + Date.now();
  const tasks = wf.tasks.map(t => ({
    id: 'task-' + Math.random().toString(36).slice(2, 9),
    task_definition_id: t.id,
    task_name: t.name,
    task_type: t.type,
    workflow_exec_id: execId,
    status: 'pending',
    retry_count: 0,
    max_retries: 3,
    logs: [],
    queued_at: null, started_at: null, completed_at: null,
  }));

  const exec = {
    id: execId,
    workflow_id: wf.id,
    workflow_name: wf.name,
    status: 'running',
    tasks,
    wfTasks: wf.tasks,
    started_at: new Date().toISOString(),
    completed_at: null,
    _pending: new Set(tasks.map(t => t.task_definition_id)),
    _completed: new Set(),
    _running: new Set(),
  };

  executions.unshift(exec);
  simMetrics.workflows_started++;
  simMetrics.queue_depth += tasks.length;

  addLogEntry(exec.workflow_name, 'INFO', `Workflow started: ${wf.name}`, { exec_id: execId.slice(-8), tasks: tasks.length });

  scheduleTaskWave(exec);
  selectedExecId = execId;
  renderExecList();
  renderExecDetail(exec);

  return exec;
}

function scheduleTaskWave(exec) {
  // Find tasks ready to run (all deps completed)
  const readyIds = exec.wfTasks
    .filter(t => !exec._completed.has(t.id) && !exec._running.has(t.id) &&
      t.dependencies.every(d => exec._completed.has(d)))
    .map(t => t.id);

  readyIds.forEach((taskDefId, i) => {
    const taskExec = exec.tasks.find(t => t.task_definition_id === taskDefId);
    if (!taskExec) return;
    exec._running.add(taskDefId);
    exec._pending.delete(taskDefId);
    simMetrics.queue_depth = Math.max(0, simMetrics.queue_depth - 1);
    simMetrics.tasks_dispatched++;

    // Queue → Running delay
    const queueDelay = 200 + i * 150 + Math.random() * 300;
    setTimeout(() => {
      taskExec.status = 'queued';
      taskExec.queued_at = new Date().toISOString();
      addLogEntry(taskExec.task_name, 'INFO', 'Task queued for execution', { exec_id: exec.id.slice(-8) });
      renderDAGIfVisible(exec);
      renderExecListItem(exec);
    }, queueDelay);

    const runDelay = queueDelay + 200 + Math.random() * 300;
    setTimeout(() => {
      taskExec.status = 'running';
      taskExec.started_at = new Date().toISOString();
      taskExec.worker_id = 'worker-' + Math.random().toString(36).slice(2, 6);
      addLogEntry(taskExec.task_name, 'INFO', `Execution started on ${taskExec.worker_id}`, { type: taskExec.task_type });
      renderDAGIfVisible(exec);
      renderExecListItem(exec);
    }, runDelay);

    // Task duration: 1–5 seconds
    const execDuration = 1200 + Math.random() * 3800;
    const doneDelay = runDelay + execDuration;

    // Simulate log streaming during execution
    const logIntervals = [0.2, 0.5, 0.8].map(f =>
      setTimeout(() => {
        if (taskExec.status !== 'running') return;
        const msgs = [
          ['INFO', `Processing batch ${Math.floor(Math.random()*100)}…`, { progress: `${Math.floor(f*100)}%` }],
          ['INFO', 'Resource checkpoint OK', { memory_mb: Math.floor(200 + Math.random()*600) }],
          ['INFO', `Intermediate result saved`, { rows: Math.floor(Math.random()*50000) }],
        ];
        const [level, msg, fields] = msgs[Math.floor(Math.random()*msgs.length)];
        taskExec.logs.push({ timestamp: new Date().toISOString(), level: level.toLowerCase(), message: msg, fields });
        addLogEntry(taskExec.task_name, level, msg, fields);
      }, runDelay + execDuration * f)
    );

    setTimeout(() => {
      // Occasional failure (5% chance)
      const fails = Math.random() < 0.05;

      if (fails && taskExec.retry_count < taskExec.max_retries) {
        taskExec.status = 'retrying';
        taskExec.retry_count++;
        simMetrics.tasks_retried++;
        const errMsg = 'Transient error: connection timeout';
        taskExec.error = errMsg;
        taskExec.logs.push({ timestamp: new Date().toISOString(), level: 'error', message: errMsg });
        addLogEntry(taskExec.task_name, 'WARN', `Task failed, retrying (${taskExec.retry_count}/${taskExec.max_retries})`, { error: errMsg });
        renderDAGIfVisible(exec);

        // Retry after backoff
        setTimeout(() => {
          taskExec.status = 'running';
          taskExec.error = '';
          addLogEntry(taskExec.task_name, 'INFO', 'Retry attempt started', { attempt: taskExec.retry_count });
          setTimeout(() => completeTask(exec, taskExec, taskDefId, false), 1500 + Math.random() * 2000);
        }, 1500 * Math.pow(2, taskExec.retry_count - 1));
      } else {
        completeTask(exec, taskExec, taskDefId, fails && taskExec.retry_count >= taskExec.max_retries);
      }
    }, doneDelay);
  });
}

function completeTask(exec, taskExec, taskDefId, forceFailure) {
  const succeeds = !forceFailure;

  if (succeeds) {
    taskExec.status = 'completed';
    taskExec.completed_at = new Date().toISOString();
    taskExec.logs.push({ timestamp: new Date().toISOString(), level: 'info', message: 'Task completed successfully', fields: { duration_ms: Math.floor(Math.random()*3000+500) } });
    addLogEntry(taskExec.task_name, 'INFO', '✓ Task completed', { worker: taskExec.worker_id?.slice(-8) });
    exec._completed.add(taskDefId);
    exec._running.delete(taskDefId);
    simMetrics.tasks_completed++;
    throughputHistory.push(throughputHistory[throughputHistory.length - 1] + 1);
    if (throughputHistory.length > 12) throughputHistory.shift();
  } else {
    taskExec.status = 'dead_letter';
    taskExec.completed_at = new Date().toISOString();
    taskExec.error = `Max retries (${taskExec.max_retries}) exceeded`;
    taskExec.logs.push({ timestamp: new Date().toISOString(), level: 'error', message: taskExec.error });
    addLogEntry(taskExec.task_name, 'ERROR', `Task moved to dead letter: ${taskExec.error}`, {});
    exec._running.delete(taskDefId);
    simMetrics.tasks_failed++;
  }

  renderDAGIfVisible(exec);
  renderExecListItem(exec);

  // Check workflow completion
  const allTasksDone = exec.tasks.every(t => ['completed', 'failed', 'dead_letter'].includes(t.status));
  if (allTasksDone) {
    const anyFailed = exec.tasks.some(t => t.status === 'dead_letter');
    exec.status = anyFailed ? 'failed' : 'completed';
    exec.completed_at = new Date().toISOString();
    if (anyFailed) simMetrics.workflows_failed++;
    else simMetrics.workflows_completed++;
    addLogEntry(exec.workflow_name, anyFailed ? 'WARN' : 'INFO',
      `Workflow ${exec.status}: ${exec.workflow_name}`,
      { duration_s: ((Date.now() - new Date(exec.started_at).getTime()) / 1000).toFixed(1) });
    renderExecListItem(exec);
    if (selectedExecId === exec.id) renderExecDetail(exec);
    return;
  }

  // Schedule next wave
  if (succeeds && exec._running.size === 0 || exec._running.size < 4) {
    scheduleTaskWave(exec);
  }
}

// ─── Execution List ────────────────────────────────────
function renderExecList() {
  const scroll = document.getElementById('exec-list-scroll');
  if (!executions.length) {
    scroll.innerHTML = '<div style="padding:20px;color:var(--text3);font-size:12px;text-align:center">No executions yet. Run a workflow to start.</div>';
    return;
  }
  scroll.innerHTML = executions.map(exec => {
    const completed = exec.tasks.filter(t => t.status === 'completed').length;
    const pct = exec.tasks.length ? Math.round(completed / exec.tasks.length * 100) : 0;
    const color = exec.status === 'completed' ? '#22d3a0' : exec.status === 'failed' ? '#ff5f57' : '#3b9eff';
    const elapsed = formatElapsed(exec.started_at, exec.completed_at);
    return `
      <div class="exec-item ${selectedExecId === exec.id ? 'active' : ''}" onclick="selectExec('${exec.id}')">
        <div class="exec-item-top">
          <span class="exec-wf-name">${exec.workflow_name}</span>
          <span class="exec-time">${elapsed}</span>
        </div>
        <div class="exec-item-bottom">
          <span class="badge ${exec.status}">${exec.status}</span>
          <div class="exec-progress">
            <div class="exec-progress-fill" style="width:${pct}%;background:${color}"></div>
          </div>
          <span class="exec-task-count">${completed}/${exec.tasks.length}</span>
        </div>
      </div>
    `;
  }).join('');
}

function renderExecListItem(exec) {
  if (executions.length > 1) renderExecList();
}

function updateExecListDisplay() {
  if (executions.some(e => e.status === 'running')) renderExecList();
}

function selectExec(id) {
  selectedExecId = id;
  const exec = executions.find(e => e.id === id);
  if (exec) renderExecDetail(exec);
  renderExecList();
}

// ─── Execution Detail ────────────────────────────────
function renderExecDetail(exec) {
  const detail = document.getElementById('exec-detail');
  const completed = exec.tasks.filter(t => t.status === 'completed').length;
  const running = exec.tasks.filter(t => t.status === 'running').length;
  const failed = exec.tasks.filter(t => ['failed', 'dead_letter'].includes(t.status)).length;
  const retrying = exec.tasks.filter(t => t.status === 'retrying').length;

  detail.innerHTML = `
    <div class="exec-detail-header">
      <div>
        <div class="exec-detail-title">${exec.workflow_name}</div>
        <div class="exec-detail-sub">${exec.id.slice(0, 14)}… · ${formatElapsed(exec.started_at, exec.completed_at)}</div>
      </div>
      <span class="badge ${exec.status}">${exec.status}</span>
      <div class="exec-detail-actions">
        ${exec.status === 'failed' ? `<button class="action-btn retry" onclick="retryExec('${exec.id}')">↺ Retry</button>` : ''}
        <button class="action-btn" onclick="switchTab('logs')">View Logs</button>
      </div>
    </div>
    <div class="exec-detail-body">
      <div class="stats-bar">
        <div class="stat-box">
          <div class="stat-box-val" style="color:var(--green)">${completed}</div>
          <div class="stat-box-key">Completed</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-val" style="color:var(--blue)">${running}</div>
          <div class="stat-box-key">Running</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-val" style="color:var(--red)">${failed}</div>
          <div class="stat-box-key">Failed</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-val" style="color:var(--amber)">${retrying}</div>
          <div class="stat-box-key">Retrying</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-val">${exec.tasks.length}</div>
          <div class="stat-box-key">Total Tasks</div>
        </div>
      </div>
      <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">
        <div class="dag-viz" id="exec-dag-viz">
          ${renderExecDAGSVG(exec)}
        </div>
        <div style="flex:1;overflow-y:auto;padding:12px 16px" id="exec-task-list">
          ${renderTaskList(exec)}
        </div>
      </div>
    </div>
  `;
}

function renderExecDAGSVG(exec) {
  const tasks = exec.wfTasks;
  if (!tasks?.length) return '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:12px">No task graph</div>';

  // Layout: compute levels
  const levels = new Map();
  function getLevel(id) {
    if (levels.has(id)) return levels.get(id);
    const t = tasks.find(t => t.id === id);
    const l = Math.max(0, ...(t?.dependencies || []).map(d => getLevel(d) + 1));
    levels.set(id, l); return l;
  }
  tasks.forEach(t => getLevel(t.id));

  const byLevel = new Map();
  levels.forEach((lv, id) => { if (!byLevel.has(lv)) byLevel.set(lv, []); byLevel.get(lv).push(id); });

  const nodeW = 140, nodeH = 44, rowH = 100, colW = 160;
  const positions = new Map();
  byLevel.forEach((ids, level) => {
    const totalW = ids.length * colW;
    ids.forEach((id, i) => {
      positions.set(id, { x: -totalW / 2 + i * colW + colW / 2 - nodeW / 2 + 400, y: level * rowH + 20 });
    });
  });

  const maxLevel = Math.max(...levels.values());
  const svgH = (maxLevel + 1) * rowH + nodeH + 20;

  let edgesSVG = '';
  tasks.forEach(t => {
    (t.dependencies || []).forEach(depId => {
      const from = positions.get(depId);
      const to = positions.get(t.id);
      if (!from || !to) return;
      const taskExec = exec.tasks.find(te => te.task_definition_id === t.id);
      const isRunning = taskExec?.status === 'running';
      edgesSVG += `<path d="M${from.x + nodeW/2},${from.y + nodeH} C${from.x + nodeW/2},${from.y + nodeH + 30} ${to.x + nodeW/2},${to.y - 30} ${to.x + nodeW/2},${to.y}"
        fill="none" stroke="${isRunning ? '#3b9eff' : '#2e2e48'}" stroke-width="1.5"
        stroke-dasharray="${isRunning ? '5 3' : '0'}" marker-end="url(#exec-arrow)" />`;
    });
  });

  let nodesSVG = '';
  tasks.forEach(t => {
    const pos = positions.get(t.id);
    if (!pos) return;
    const taskExec = exec.tasks.find(te => te.task_definition_id === t.id);
    const status = taskExec?.status || 'pending';
    const color = STATUS_COLORS[status] || '#9090a8';
    const typeInfo = TASK_TYPES.find(ti => ti.value === t.type) || { icon: '⚙️' };

    nodesSVG += `
      <g style="cursor:pointer" onclick="showTaskDetail('${exec.id}', '${t.id}')">
        ${status === 'running' ? `<rect x="${pos.x-2}" y="${pos.y-2}" width="${nodeW+4}" height="${nodeH+4}" rx="11" fill="none" stroke="${color}" stroke-width="1.5" style="animation:nodePulse 1.4s infinite" />` : ''}
        <rect x="${pos.x}" y="${pos.y}" width="${nodeW}" height="${nodeH}" rx="9" fill="#1a1a2e" stroke="${color}" stroke-width="1" />
        <rect x="${pos.x+1}" y="${pos.y+1}" width="${nodeW-2}" height="3" fill="${color}" rx="8" />
        <text x="${pos.x+10}" y="${pos.y+24}" font-size="12" dominant-baseline="middle">${typeInfo.icon}</text>
        <text x="${pos.x+28}" y="${pos.y+20}" fill="#e8e8f0" font-size="10" font-weight="600" font-family="DM Sans,sans-serif">${t.name.length > 14 ? t.name.slice(0,13)+'…' : t.name}</text>
        <text x="${pos.x+28}" y="${pos.y+34}" fill="${color}" font-size="8" font-family="IBM Plex Mono,monospace">${status.toUpperCase()}</text>
      </g>`;
  });

  return `<svg viewBox="0 0 800 ${Math.max(svgH, 100)}" width="100%" height="100%" style="overflow:visible">
    <defs>
      <marker id="exec-arrow" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
        <polygon points="0 0, 6 2.5, 0 5" fill="#4a4a68" />
      </marker>
    </defs>
    ${edgesSVG}
    ${nodesSVG}
  </svg>`;
}

function renderTaskList(exec) {
  return exec.tasks.map(t => {
    const color = STATUS_COLORS[t.status] || '#9090a8';
    const dur = t.started_at ? formatElapsed(t.started_at, t.completed_at) : '—';
    return `
      <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
        <span class="badge ${t.status}" style="flex-shrink:0">${t.status}</span>
        <span style="font-weight:500;flex:1">${t.task_name}</span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">${t.worker_id?.slice(-8) || ''}</span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3);min-width:40px;text-align:right">${dur}</span>
        ${t.retry_count > 0 ? `<span style="font-size:10px;color:var(--amber)">↺${t.retry_count}</span>` : ''}
      </div>
    `;
  }).join('');
}

function renderDAGIfVisible(exec) {
  if (selectedExecId === exec.id) {
    const vizEl = document.getElementById('exec-dag-viz');
    const taskListEl = document.getElementById('exec-task-list');
    if (vizEl) vizEl.innerHTML = renderExecDAGSVG(exec);
    if (taskListEl) taskListEl.innerHTML = renderTaskList(exec);
  }
}

function retryExec(execId) {
  const exec = executions.find(e => e.id === execId);
  if (!exec) return;
  const wf = workflows.find(w => w.id === exec.workflow_id);
  if (wf) startExecution(wf);
}

function showTaskDetail(execId, taskDefId) {
  const exec = executions.find(e => e.id === execId);
  if (!exec) return;
  const task = exec.tasks.find(t => t.task_definition_id === taskDefId);
  if (!task) return;
  switchTab('logs');
}

// ─── Logs ────────────────────────────────────────────
function addLogEntry(taskName, level, message, fields) {
  const entry = {
    timestamp: new Date().toISOString(),
    level, message, fields,
    taskName,
    _new: true,
  };
  allLogs.push(entry);
  if (allLogs.length > 500) allLogs.shift();
  renderLogs();
  setTimeout(() => { entry._new = false; }, 600);
}

function renderLogs() {
  const container = document.getElementById('log-container');
  const search = logSearchFilter.toLowerCase();
  const filtered = allLogs.filter(l => {
    if (logLevelFilter !== 'all' && l.level?.toLowerCase() !== logLevelFilter) return false;
    if (search && !l.message?.toLowerCase().includes(search) && !l.taskName?.toLowerCase().includes(search)) return false;
    return true;
  });

  document.getElementById('log-count').textContent = filtered.length + ' entries';

  container.innerHTML = filtered.slice(-200).map(l => `
    <div class="log-entry ${l._new ? 'new-entry' : ''} ${l.level?.toUpperCase()}">
      <span class="log-ts">${formatTs(l.timestamp)}</span>
      <span class="log-lvl ${l.level?.toUpperCase()}">${l.level?.toUpperCase()}</span>
      ${l.taskName ? `<span class="log-task-tag">${l.taskName}</span>` : ''}
      <span class="log-msg">${l.message}${l.fields && Object.keys(l.fields).length ? ' ' + JSON.stringify(l.fields) : ''}</span>
    </div>
  `).join('');

  container.scrollTop = container.scrollHeight;
}

function filterLogs(val) { logSearchFilter = val; renderLogs(); }
function setLogLevel(level, btn) {
  logLevelFilter = level;
  document.querySelectorAll('.log-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLogs();
}
function clearLogs() { allLogs = []; renderLogs(); }

// ─── Metrics ─────────────────────────────────────────
function updateMetricsDisplay() {
  // Update topbar
  const activeCount = executions.filter(e => e.status === 'running').length;
  document.getElementById('hdr-active').textContent = activeCount;
  document.getElementById('hdr-completed').textContent = simMetrics.workflows_completed;
  document.getElementById('hdr-failed').textContent = simMetrics.workflows_failed;
  document.getElementById('hdr-queue').textContent = simMetrics.queue_depth;

  if (document.getElementById('tab-metrics').classList.contains('active')) {
    renderMetrics();
  }
}

function renderMetrics() {
  const grid = document.getElementById('metrics-grid');
  const total = simMetrics.workflows_completed + simMetrics.workflows_failed;
  const successRate = total > 0 ? Math.round(simMetrics.workflows_completed / total * 100) : 100;

  const cards = [
    { val: simMetrics.workflows_started, label: 'Workflows Started', color: 'var(--blue)', delta: '+' + (simMetrics.workflows_started % 5) },
    { val: simMetrics.workflows_completed, label: 'Completed', color: 'var(--green)', delta: null },
    { val: simMetrics.workflows_failed, label: 'Failed', color: 'var(--red)', delta: null },
    { val: successRate + '%', label: 'Success Rate', color: successRate > 90 ? 'var(--green)' : 'var(--amber)', delta: null },
    { val: simMetrics.tasks_dispatched, label: 'Tasks Dispatched', color: 'var(--purple)', delta: null },
    { val: simMetrics.tasks_completed, label: 'Tasks Completed', color: 'var(--green)', delta: null },
    { val: simMetrics.tasks_retried, label: 'Tasks Retried', color: 'var(--amber)', delta: null },
    { val: simMetrics.queue_depth, label: 'Queue Depth', color: 'var(--text)', delta: null },
  ];

  grid.innerHTML = cards.map(c => `
    <div class="metric-card">
      <div class="metric-card-val" style="color:${c.color}">${c.val}</div>
      <div class="metric-card-label">${c.label}</div>
    </div>
  `).join('');

  // Throughput chart
  const chart = document.getElementById('throughput-chart');
  const max = Math.max(...throughputHistory, 1);
  const cols = [2,4,6,8,10,12,8,5,7,9,14,throughputHistory[throughputHistory.length-1]||0];
  chart.innerHTML = cols.map((v, i) => `
    <div class="bar-col">
      <div class="bar" style="height:${Math.round((v/16)*80)}px;background:${v > 10 ? 'var(--green)' : 'var(--accent)'}"></div>
      <span class="bar-label">${i - 11}m</span>
    </div>
  `).join('');

  // Status distribution
  const allTaskStatuses = executions.flatMap(e => e.tasks.map(t => t.status));
  const counts = {};
  allTaskStatuses.forEach(s => counts[s] = (counts[s]||0) + 1);
  const total2 = allTaskStatuses.length || 1;
  const dist = document.getElementById('status-distribution');
  dist.innerHTML = Object.entries(counts).map(([status, count]) => `
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="font-size:20px;font-weight:700;font-family:var(--mono);color:${STATUS_COLORS[status]}">${count}</div>
      <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em">${status}</div>
      <div style="width:60px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${Math.round(count/total2*100)}%;background:${STATUS_COLORS[status]};border-radius:2px"></div>
      </div>
    </div>
  `).join('');
}

// ─── Simulation Tick ──────────────────────────────────
function simulationTick() {
  // Auto-start a demo execution if nothing is happening
  if (executions.length === 0 && workflows.length > 0) {
    setTimeout(() => triggerCurrentWorkflow(), 1000);
  }
}

// ─── Navigation ───────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab)?.classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(btn => {
    if (btn.textContent.toLowerCase().includes(tab)) btn.classList.add('active');
  });
  if (tab === 'metrics') renderMetrics();
  if (tab === 'logs') renderLogs();
  if (tab === 'executions' && selectedExecId) {
    const exec = executions.find(e => e.id === selectedExecId);
    if (exec) { renderExecList(); renderExecDetail(exec); }
    else renderExecList();
  }
}

// ─── Helpers ──────────────────────────────────────────
function formatElapsed(start, end) {
  if (!start) return '—';
  const ms = (end ? new Date(end) : new Date()) - new Date(start);
  if (ms < 0) return '0s';
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  return Math.floor(ms / 60000) + 'm ' + Math.floor((ms % 60000) / 1000) + 's';
}

function formatTs(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('en', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3,'0');
}

// ─── Boot ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
</script>
