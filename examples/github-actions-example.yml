# Example GitHub Actions workflow that can be imported into Fluxor.
# Import via: POST /api/import/yaml  or the ⬆ button in the Builder.
#
# Mapping rules applied by the importer:
#   jobs        → tasks
#   needs:      → dependencies between tasks
#   run:        → generic task (sh -c "<script>")
#   docker://   → container task
#   uses:       → placeholder task (named actions cannot run natively)
#   env:        → environment variables on the task config

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: "20"

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4     # → placeholder task

      - name: Install
        run: npm ci                    # → generic shell task

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Unit tests
        run: npm test -- --coverage

      - name: Lint
        run: npm run lint

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Build Docker image
        uses: docker://docker:24-cli   # → container task (docker:// prefix)

      - name: Run smoke test
        run: |
          echo "Running smoke tests..."
          curl -f http://localhost:3000/health || exit 1

  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    env:
      DEPLOY_ENV: staging
    steps:
      - name: Deploy
        run: |
          echo "Deploying to $DEPLOY_ENV"
          ./scripts/deploy.sh --env $DEPLOY_ENV
